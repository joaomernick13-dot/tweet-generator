<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Gerador de Tweet</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
      padding: 24px 16px 60px;
    }

    .container {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
    }

    h1 {
      font-size: 32px;
      margin: 32px 0 14px;
    }

    p {
      font-size: 16px;
      opacity: 0.9;
    }

    input[type="file"] {
      width: 100%;
      max-width: 360px;
      background: white;
      color: #111;
      padding: 14px;
      border-radius: 14px;
      margin: 14px 0;
      font-size: 15px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 20px;
      margin: 8px 5px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      background: white;
      color: #0077ff;
    }

    .option {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 12px auto 4px;
      font-size: 14px;
      opacity: 0.9;
    }

    .option input {
      width: 18px;
      height: 18px;
      accent-color: #0077ff;
    }

    .option-help {
      font-size: 12px;
      line-height: 1.35;
      opacity: 0.65;
      margin: 4px auto 6px;
      max-width: 330px;
    }

    .dica {
      font-size: 14px;
      line-height: 1.4;
      opacity: 0.75;
      margin: 20px auto;
      max-width: 340px;
    }

    #resultados {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      margin-top: 30px;
    }

    .resultado {
      width: 100%;
      max-width: 520px;
      border-radius: 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 30px;
        margin-top: 22px;
      }

      button {
        width: 46%;
        min-width: 140px;
      }

      .resultado {
        max-width: 96vw;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Gerador de Tweet</h1>

    <p>Envie um ou vários prints de tweets:</p>

    <input type="file" id="tweetInput" accept="image/*" multiple>

    <label class="option">
      <input type="checkbox" id="hideTopRight" checked>
      Remover x.com automaticamente
    </label>

    <p class="option-help">
      Tenta detectar e ocultar texto escuro no canto superior direito. Desative se algo importante aparecer ali.
    </p>

    <br>

    <button onclick="generate()">Gerar imagens</button>
    <button onclick="downloadAll()">Baixar todas</button>

    <p class="dica">
      No iPhone: toque e segure em uma imagem gerada para salvar no rolo da câmera.
    </p>

    <div id="resultados"></div>
  </div>

  <script>
    const W = 1080;
    const H = 1350;
    let imagensGeradas = [];

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    function loadFile(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = URL.createObjectURL(file);
      });
    }

    function roundedClip(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function drawBackgroundCover(ctx, img) {
      const scale = Math.max(W / img.width, H / img.height);
      const sw = W / scale;
      const sh = H / scale;
      const sx = (img.width - sw) / 2;
      const sy = (img.height - sh) / 2;
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, W, H);
    }

    function fillRounded(ctx, x, y, width, height, radius) {
      if (typeof ctx.roundRect === "function") {
        ctx.beginPath();
        ctx.roundRect(x, y, width, height, radius);
        ctx.fill();
      } else {
        roundedClip(ctx, x, y, width, height, radius);
        ctx.fill();
      }
    }

    function hideTweetTopRightAuto(ctx, x, y, width, height) {
      const scanX = Math.round(x + width * 0.50);
      const scanY = Math.round(y + Math.max(8, height * 0.018));
      const scanW = Math.round(width * 0.48);
      const scanH = Math.round(Math.min(height * 0.13, width * 0.14, 112));

      let imageData;
      try {
        imageData = ctx.getImageData(scanX, scanY, scanW, scanH);
      } catch (error) {
        return;
      }

      const data = imageData.data;
      let minX = scanW;
      let minY = scanH;
      let maxX = 0;
      let maxY = 0;
      let darkCount = 0;

      for (let py = 0; py < scanH; py++) {
        for (let px = 0; px < scanW; px++) {
          const idx = (py * scanW + px) * 4;
          const r = data[idx];
          const g = data[idx + 1];
          const b = data[idx + 2];
          const a = data[idx + 3];
          const brightness = (r + g + b) / 3;

          if (a > 80 && brightness < 165 && r < 190 && g < 190 && b < 190) {
            darkCount++;
            minX = Math.min(minX, px);
            minY = Math.min(minY, py);
            maxX = Math.max(maxX, px);
            maxY = Math.max(maxY, py);
          }
        }
      }

      if (darkCount < 12) return;

      const detectedW = maxX - minX;
      const detectedH = maxY - minY;

      if (detectedW < 6 || detectedH < 4) return;

      const padX = Math.max(55, width * 0.07);
      const padY = Math.max(14, width * 0.018);

      let patchX = scanX + minX - padX;
      let patchY = scanY + minY - padY;
      let patchW = detectedW + padX * 2;
      let patchH = detectedH + padY * 2;

      const maxPatchW = width * 0.44;
      const maxPatchH = Math.min(height * 0.135, width * 0.145, 105);

      patchW = Math.min(patchW, maxPatchW);
      patchH = Math.min(patchH, maxPatchH);

      patchX = Math.max(x + width * 0.50, patchX);
      patchY = Math.max(y + 4, patchY);

      if (patchX + patchW > x + width - 8) {
        patchW = x + width - 8 - patchX;
      }

      ctx.save();
      ctx.fillStyle = "white";
      fillRounded(ctx, patchX, patchY, patchW, patchH, 12);
      ctx.restore();
    }

    async function generate() {
      const files = Array.from(document.getElementById("tweetInput").files);
      const resultados = document.getElementById("resultados");
      const hideTopRight = document.getElementById("hideTopRight").checked;

      resultados.innerHTML = "";
      imagensGeradas = [];

      if (!files.length) {
        alert("Envie pelo menos um print de tweet.");
        return;
      }

      let bg;
      try {
        bg = await loadImage("background.jpg?v=5");
      } catch (error) {
        alert("Não consegui carregar o fundo background.jpg.");
        return;
      }

      for (let i = 0; i < files.length; i++) {
        const tweet = await loadFile(files[i]);

        const canvas = document.createElement("canvas");
        canvas.width = W;
        canvas.height = H;

        const ctx = canvas.getContext("2d");

        drawBackgroundCover(ctx, bg);

        const proporcao = tweet.height / tweet.width;

        let maxWidth = 980;
        let maxHeight = 1120;

        if (proporcao > 1.7) {
          maxWidth = 1000;
          maxHeight = 1230;
        }

        const scale = Math.min(
          maxWidth / tweet.width,
          maxHeight / tweet.height
        );

        const tweetWidth = tweet.width * scale;
        const tweetHeight = tweet.height * scale;

        const x = (W - tweetWidth) / 2;
        const y = (H - tweetHeight) / 2;
        const radius = Math.min(38, tweetWidth * 0.045);

        ctx.save();
        ctx.shadowColor = "rgba(0,0,0,0.24)";
        ctx.shadowBlur = 38;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 18;
        ctx.fillStyle = "white";
        roundedClip(ctx, x, y, tweetWidth, tweetHeight, radius);
        ctx.fill();
        ctx.restore();

        ctx.save();
        roundedClip(ctx, x, y, tweetWidth, tweetHeight, radius);
        ctx.clip();
        ctx.drawImage(tweet, x, y, tweetWidth, tweetHeight);

        if (hideTopRight) {
          hideTweetTopRightAuto(ctx, x, y, tweetWidth, tweetHeight);
        }

        ctx.restore();

        const dataUrl = canvas.toDataURL("image/png");
        imagensGeradas.push(dataUrl);

        const img = document.createElement("img");
        img.src = dataUrl;
        img.className = "resultado";
        img.alt = "Imagem gerada";
        resultados.appendChild(img);
      }
    }

    function downloadAll() {
      if (!imagensGeradas.length) {
        alert("Gere as imagens primeiro.");
        return;
      }

      imagensGeradas.forEach((src, index) => {
        const link = document.createElement("a");
        link.href = src;
        link.download = `gerador-de-tweet-${index + 1}.png`;
        link.click();
      });
    }
  </script>
</body>
</html>
