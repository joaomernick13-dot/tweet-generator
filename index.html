<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Gerador de Tweet</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
      padding: 24px 16px 60px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
    }

    h1 {
      font-size: 32px;
      margin: 32px 0 14px;
    }

    p {
      font-size: 16px;
      opacity: 0.9;
    }

    input[type="file"] {
      width: 100%;
      max-width: 360px;
      background: white;
      color: #111;
      padding: 14px;
      border-radius: 14px;
      margin: 14px 0;
      font-size: 15px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 20px;
      margin: 8px 5px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      background: white;
      color: #0077ff;
    }

    .dica {
      font-size: 14px;
      line-height: 1.4;
      opacity: 0.75;
      margin: 20px auto;
      max-width: 340px;
    }

    #resultados {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      margin-top: 30px;
    }

    .resultado {
      width: 100%;
      max-width: 390px;
      border-radius: 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 30px;
        margin-top: 22px;
      }

      button {
        width: 46%;
        min-width: 140px;
      }

      .resultado {
        max-width: 94vw;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Gerador de Tweet</h1>

    <p>Envie um ou vários prints de tweets:</p>

    <input type="file" id="tweetInput" accept="image/*" multiple>

    <br>

    <button onclick="generate()">Gerar imagens</button>
    <button onclick="downloadAll()">Baixar todas</button>

    <p class="dica">
      No iPhone: toque e segure em uma imagem gerada para salvar no rolo da câmera.
    </p>

    <div id="resultados"></div>
  </div>

  <script>
    const W = 1080;
    const H = 1350;
    let imagensGeradas = [];

    function loadImage(src) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.src = src;
      });
    }

    function loadFile(file) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.src = URL.createObjectURL(file);
      });
    }

    function roundedClip(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    async function generate() {
      const files = Array.from(document.getElementById("tweetInput").files);
      const resultados = document.getElementById("resultados");

      resultados.innerHTML = "";
      imagensGeradas = [];

      if (!files.length) {
        alert("Envie pelo menos um print de tweet.");
        return;
      }

      const bg = await loadImage("fundo.jpg");

      for (let i = 0; i < files.length; i++) {
        const tweet = await loadFile(files[i]);

        const canvas = document.createElement("canvas");
        canvas.width = W;
        canvas.height = H;

        const ctx = canvas.getContext("2d");

        ctx.drawImage(bg, 0, 0, W, H);

        let tweetWidth;
        const proporcao = tweet.height / tweet.width;

        if (proporcao < 0.75) {
          tweetWidth = 1000;
        } else if (proporcao < 1.3) {
          tweetWidth = 940;
        } else if (proporcao < 2.0) {
          tweetWidth = 860;
        } else {
          tweetWidth = 780;
        }

        const scale = tweetWidth / tweet.width;
        const tweetHeight = tweet.height * scale;

        const x = (W - tweetWidth) / 2;
        const y = (H - tweetHeight) / 2 - 40;

        ctx.save();
        ctx.shadowColor = "rgba(0,0,0,0.12)";
        ctx.shadowBlur = 18;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 6;

        ctx.fillStyle = "white";
        roundedClip(ctx, x, y, tweetWidth, tweetHeight, 38);
        ctx.fill();
        ctx.restore();

        ctx.save();
        roundedClip(ctx, x, y, tweetWidth, tweetHeight, 38);
        ctx.clip();
        ctx.drawImage(tweet, x, y, tweetWidth, tweetHeight);

        ctx.strokeStyle = "rgba(255,255,255,0.7)";
        ctx.lineWidth = 2;
        roundedClip(ctx, x + 1, y + 1, tweetWidth - 2, tweetHeight - 2, 38);
        ctx.stroke();

        ctx.restore();

        const dataUrl = canvas.toDataURL("image/png");
        imagensGeradas.push(dataUrl);

        const img = document.createElement("img");
        img.src = dataUrl;
        img.className = "resultado";
        img.alt = "Imagem gerada";
        resultados.appendChild(img);
      }
    }

    function downloadAll() {
      if (!imagensGeradas.length) {
        alert("Gere as imagens primeiro.");
        return;
      }

      imagensGeradas.forEach((src, index) => {
        const link = document.createElement("a");
        link.href = src;
        link.download = `gerador-de-tweet-${index + 1}.png`;
        link.click();
      });
    }
  </script>
</body>
</html>
