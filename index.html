<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Gerador de Tweet Fofoca</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
      padding: 30px;
    }

    canvas {
      margin-top: 20px;
      max-width: 360px;
      border-radius: 20px;
      box-shadow: 0 20px 60px #000;
    }

    input, button {
      margin: 10px;
      padding: 12px;
      border-radius: 10px;
      border: none;
    }

    button {
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Gerador de Tweet </h1>


  <p>Envie o print do tweet:</p>
  <input type="file" id="tweetInput" accept="image/*">

  <br>
  <button onclick="generate()">Gerar imagem</button>
  <button onclick="downloadImage()">Baixar PNG</button>

  <br>
  <canvas id="canvas" width="1080" height="1350"></canvas>

  <script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let finalImage = null;

function loadImage(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.src = src;
  });
}

function loadFile(file) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.src = URL.createObjectURL(file);
  });
}

async function generate() {
  const tweetFile = document.getElementById("tweetInput").files[0];

  if (!tweetFile) {
    alert("Envie o print do tweet.");
    return;
  }

  const bg = await loadImage("fundo.jpg");
  const tweet = await loadFile(tweetFile);

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);

  const tweetWidth = 960;
  const scale = tweetWidth / tweet.width;
  const tweetHeight = tweet.height * scale;

  const x = (canvas.width - tweetWidth) / 2;
  const y = (canvas.height - tweetHeight) / 2;

  ctx.shadowColor = "rgba(0,0,0,0.25)";
  ctx.shadowBlur = 35;
  ctx.shadowOffsetY = 18;

  roundImage(tweet, x, y, tweetWidth, tweetHeight, 28);

  ctx.shadowColor = "transparent";
  finalImage = canvas.toDataURL("image/png");
}

function roundImage(img, x, y, width, height, radius) {
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + width - radius, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
  ctx.lineTo(x + width, y + height - radius);
  ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
  ctx.lineTo(x + radius, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();
  ctx.clip();
  ctx.drawImage(img, x, y, width, height);
  ctx.restore();
}

function downloadImage() {
  if (!finalImage) {
    alert("Gere a imagem primeiro.");
    return;
  }

  const link = document.createElement("a");
  link.download = "tweet-fofoca.png";
  link.href = finalImage;
  link.click();
}
</script>
