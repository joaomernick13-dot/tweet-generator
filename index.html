<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Tweet</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
      padding: 30px;
    }

    input, button {
      margin: 10px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
    }

    button {
      cursor: pointer;
    }

    #resultados {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      margin-top: 30px;
    }

    .resultado {
      max-width: 360px;
      width: 90%;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    .dica {
      font-size: 14px;
      opacity: 0.8;
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <h1>Gerador de Tweet</h1>

  <p>Envie um ou vários prints do tweet:</p>
  <input type="file" id="tweetInput" accept="image/*" multiple>

  <br>
  <button onclick="generate()">Gerar imagens</button>
  <button onclick="downloadAll()">Baixar todas</button>

  <p class="dica">No iPhone: toque e segure em uma imagem gerada para salvar no rolo da câmera.</p>

  <div id="resultados"></div>

  <script>
    const W = 1080;
    const H = 1350;
    let imagensGeradas = [];

    function loadImage(src) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.src = src;
      });
    }

    function loadFile(file) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.src = URL.createObjectURL(file);
      });
    }

    function roundedClip(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    async function generate() {
      const files = Array.from(document.getElementById("tweetInput").files);
      const resultados = document.getElementById("resultados");

      resultados.innerHTML = "";
      imagensGeradas = [];

      if (!files.length) {
        alert("Envie pelo menos um print do tweet.");
        return;
      }

      const bg = await loadImage("fundo.jpg");

      for (let i = 0; i < files.length; i++) {
        const tweet = await loadFile(files[i]);

        const canvas = document.createElement("canvas");
        canvas.width = W;
        canvas.height = H;

        const ctx = canvas.getContext("2d");

        ctx.drawImage(bg, 0, 0, W, H);

        const tweetWidth = 760;
        const scale = tweetWidth / tweet.width;
        const tweetHeight = tweet.height * scale;

        const x = (W - tweetWidth) / 2;
        const y = (H - tweetHeight) / 2;

        ctx.save();
        ctx.shadowColor = "rgba(0,0,0,0.55)";
        ctx.shadowBlur = 70;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 35;

        roundedClip(ctx, x, y, tweetWidth, tweetHeight, 28);
        ctx.clip();
        ctx.drawImage(tweet, x, y, tweetWidth, tweetHeight);
        ctx.restore();

        const dataUrl = canvas.toDataURL("image/png");
        imagensGeradas.push(dataUrl);

        const img = document.createElement("img");
        img.src = dataUrl;
        img.className = "resultado";
        img.alt = "Imagem gerada";
        resultados.appendChild(img);
      }
    }

    function downloadAll() {
      if (!imagensGeradas.length) {
        alert("Gere as imagens primeiro.");
        return;
      }

      imagensGeradas.forEach((src, index) => {
        const link = document.createElement("a");
        link.href = src;
        link.download = `gerador-de-tweet-${index + 1}.png`;
        link.click();
      });
    }
  </script>

</body>
</html>
